- name: "Update All Servers"
  hosts: all
  remote_user: root
  vars_files:
    - "vars/secrets.yaml"
  vars:
    ansible_ssh_private_key_file: "{{ ssh_key_path }}"
  tasks:
  - name: Update and upgrade apt packages
    become: true
    apt:
      upgrade: yes
      update_cache: yes
      autoclean: yes
      autoremove: yes
      cache_valid_time: 86400 #One day