---
# Directory Structure
- name: Create Directory Structure for traefik
  file:
    path: "{{ item }}"
    state: directory
    mode: 0775
  with_items:
    - "{{ traefik_config.directory }}"
    # - "{{ traefik_config.directory }}/certs"
    - "{{ traefik_config.directory }}/dynamic"
    - "{{ traefik_config.directory }}/letsencrypt"

# Certificate
# - name: Generate private key (RSA 2048)
#   community.crypto.openssl_privatekey:
