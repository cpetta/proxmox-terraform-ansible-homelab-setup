#     privatekey_path: "{{ traefik_config.directory }}/certs/local.key"
#     provider: selfsigned
#     selfsigned_not_after: +365d


# Install traefik

# docker-compose.yml
- name: create docker-compose file to run container
  template:
    src: docker-compose.yml.j2
    dest: "{{ traefik_config.directory }}/docker-compose.yml"
    mode: 0655
  vars:
    configurations: "{{ traefik_config }}"

# traefik.yml
- name: create traefik.yml file
  template:
    src: traefik.yml.j2
    dest: "{{ traefik_config.directory }}/traefik.yml"
    mode: 0655
  vars:
    configurations: "{{ traefik_config }}"

# config.yml
# - name: create config.yml file
#   template:
#     src: config.yml.j2
#     dest: "{{ traefik_config.directory }}/config.yml"
#     mode: 0655
#   vars:
#     configurations: "{{ traefik_config }}"

- name: Remove Docker container
  community.docker.docker_container:
    name: "{{ traefik_config.container_name }}"
    state: absent

- name: start container using docker-compose
  community.docker.docker_compose_v2:
    project_src: "{{ traefik_config.directory }}"
    recreate: always
